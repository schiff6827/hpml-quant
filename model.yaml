version: 1
project: "hpml-scale-vs-precision"
hardware_envelope:
  vram_gb: 96
  gpu: "RTX 6000 Pro Blackwell Max-Q"
  compute_dtype_default: "bf16"

paths:
  hf_home: "/opt/hpml_project/models/huggingface"
  checkpoints_root: "/opt/hpml_project/models/checkpoints"

runtime:
  framework: "vllm"
  vllm_version: "TBD"
  torch_version: "TBD"
  cuda_version: "TBD"
  driver_version: "TBD"

models:
  # --------------------------
  # FP16 "Gold" (unquantized)
  # --------------------------
  - key: "qwen25-7b-instruct-fp16"
    family: "qwen2.5"
    params_b: 7
    variant: "instruct"
    source: { type: "hf", id: "Qwen/Qwen2.5-7B-Instruct" }
    precision: { weights: "fp16", compute: "bf16" }
    formats: ["hf_transformers"]
    local: { snapshot_dir: "/opt/hpml_project/models/checkpoints/Qwen--Qwen2.5-7B-Instruct" }
    tags: ["frontier", "fp16", "gold", "dense"]

  - key: "qwen25-14b-instruct-fp16"
